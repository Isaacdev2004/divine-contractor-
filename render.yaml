# Render Blueprint — Divine Contractor site
# Connect repo: https://dashboard.render.com/blueprint/new
services:
  - type: web
    name: divine-contractor
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10.26.2 && pnpm install && pnpm run build:site
    startCommand: pnpm run start:site
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_VERSION
        value: "22"
