kind = "web"
previewPath = "/"
title = "Divine Contractor Services Ltd"
version = "1.0.0"
id = "artifacts/divine-contractor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24062

[services.development]
run = "pnpm --filter @workspace/divine-contractor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/divine-contractor", "run", "build" ]
publicDir = "artifacts/divine-contractor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24062"
BASE_PATH = "/"
